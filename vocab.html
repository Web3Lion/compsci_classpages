<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary — AP Cyber Security 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #0a0e14; font-family: 'Inter', sans-serif; color: #cfe3d8; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  a { color: #39ff88; text-decoration: none; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 28px 20px 70px; }
  @keyframes blink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
  @keyframes pop { 0%{transform:scale(0.4);opacity:0;} 60%{transform:scale(1.15);} 100%{transform:scale(1);opacity:1;} }
  @keyframes flash { 0%{background:#123; } 100%{} }

  .banner { position: relative; overflow: hidden; border: 1px solid #1e3a2e; border-radius: 14px; background: linear-gradient(135deg,#0d1a12 0%,#0a0e14 60%); padding: 30px 32px; margin-bottom: 22px; }
  .banner .grain { position:absolute; inset:0; opacity:.06; background-image:repeating-linear-gradient(0deg,#39ff88 0,#39ff88 1px,transparent 1px,transparent 4px); pointer-events:none; }
  .kick { font-size: 12px; letter-spacing: 2px; color: #39ff88; text-transform: uppercase; }
  h1 { font-weight: 800; font-size: 34px; margin: 8px 0 6px; color: #eafff2; letter-spacing: -.5px; }
  .lead { color: #a9c4b6; font-size: 15px; line-height: 1.6; max-width: 640px; margin: 0; }
  .cursor { display:inline-block; width:11px; height:26px; background:#39ff88; margin-left:6px; vertical-align:middle; animation:blink 1.1s step-end infinite; }

  .card { border: 1px solid #1e3a2e; border-radius: 14px; background: #0d1410; padding: 22px; }
  .label { font-size: 12px; letter-spacing: 1.5px; color: #39ff88; margin-bottom: 14px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { font-size: 12px; padding: 8px 13px; border-radius: 999px; border: 1px solid #1e3a2e; background: #0a0e14; color: #7fa896; cursor: pointer; user-select: none; transition: all .12s; }
  .chip:hover { border-color: #2f5d44; color: #cfe3d8; }
  .chip.on { border-color: #39ff88; color: #0a0e14; background: #39ff88; font-weight: 700; }
  .chip.all { color: #ffcf5c; border-color: #4a3d1a; }
  .chip.all.on { background: #ffcf5c; color: #1a150a; border-color: #ffcf5c; }
  .count { margin-top: 12px; font-size: 12px; color: #5c7a6b; }

  .tabs { display: flex; gap: 8px; margin: 22px 0 18px; flex-wrap: wrap; }
  .tab { flex: 1; min-width: 130px; text-align: center; padding: 14px; border-radius: 12px; border: 1px solid #1e3a2e; background: #0d1410; color: #a9c4b6; cursor: pointer; font-size: 14px; font-weight: 700; letter-spacing: .5px; transition: all .12s; }
  .tab:hover { border-color: #2f5d44; }
  .tab.on { border-color: #39ff88; color: #eafff2; background: linear-gradient(160deg,#0f2318,#0d1410); box-shadow: 0 0 22px -10px #39ff88; }
  .tab small { display: block; font-weight: 400; font-size: 11px; color: #5c7a6b; margin-top: 3px; letter-spacing: 0; }

  .empty { text-align: center; padding: 46px 16px; color: #7fa896; font-size: 14px; }

  /* flashcards */
  .fc { perspective: 1400px; }
  .fc-card { position: relative; height: 300px; cursor: pointer; }
  .fc-inner { position: absolute; inset: 0; transition: transform .5s; transform-style: preserve-3d; }
  .fc-card.flip .fc-inner { transform: rotateY(180deg); }
  .fc-face { position: absolute; inset: 0; backface-visibility: hidden; border: 1px solid #244d38; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
  .fc-front { background: linear-gradient(160deg,#0f2318,#0d1410); }
  .fc-back { background: #0d1410; transform: rotateY(180deg); }
  .fc-modtag { position: absolute; top: 16px; left: 16px; font-size: 11px; color: #39ff88; }
  .fc-hint { position: absolute; bottom: 16px; font-size: 11px; color: #3d5749; }
  .fc-term { font-size: 30px; font-weight: 800; color: #eafff2; letter-spacing: -.5px; }
  .fc-def { font-size: 18px; line-height: 1.55; color: #cfe3d8; max-width: 640px; }
  .fc-ctrl { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 16px; }
  .btn { font-family:'JetBrains Mono',monospace; font-size: 13px; padding: 11px 18px; border-radius: 10px; border: 1px solid #244d38; background: #0a0e14; color: #39ff88; cursor: pointer; transition: all .12s; }
  .btn:hover { background: #0f2318; }
  .btn:disabled { opacity: .35; cursor: default; }
  .btn.primary { background: #39ff88; color: #0a0e14; border-color: #39ff88; font-weight: 700; }
  .btn.primary:hover { background: #7dffb3; }
  .prog { font-size: 13px; color: #7fa896; }

  /* decrypt game */
  .g-top { display: flex; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
  .g-stat { font-size: 12px; color: #5c7a6b; }
  .g-stat b { display: block; font-size: 22px; color: #eafff2; margin-top: 2px; }
  .g-stat.amber b { color: #ffcf5c; }
  .timerbar { height: 6px; background: #17281f; border-radius: 999px; overflow: hidden; margin-bottom: 18px; }
  .timerfill { height: 100%; width: 100%; background: #39ff88; transition: width .1s linear; }
  .g-def { font-size: 19px; line-height: 1.55; color: #eafff2; background: #0a0e14; border: 1px solid #17281f; border-radius: 12px; padding: 20px; margin-bottom: 18px; }
  .g-boxes { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-bottom: 20px; min-height: 46px; }
  .lb { width: 32px; height: 42px; border-radius: 7px; border: 1px solid #244d38; background: #0d1410; display: flex; align-items: center; justify-content: center; font-family:'JetBrains Mono',monospace; font-weight: 700; font-size: 20px; color: #39ff88; text-transform: uppercase; }
  .lb.rev { animation: pop .3s ease; border-color: #39ff88; }
  .sep { width: 14px; }
  .g-in { display: flex; gap: 10px; }
  .g-in input { flex: 1; font-family:'JetBrains Mono',monospace; font-size: 16px; padding: 13px 15px; border-radius: 10px; border: 1px solid #244d38; background: #0a0e14; color: #eafff2; outline: none; }
  .g-in input:focus { border-color: #39ff88; }
  .g-msg { text-align: center; margin-top: 14px; font-family:'JetBrains Mono',monospace; font-size: 14px; min-height: 20px; }
  .g-summary { text-align: center; padding: 30px 10px; }
  .g-summary .big { font-size: 46px; font-weight: 800; color: #39ff88; }

  /* quiz */
  .q-def { font-size: 19px; line-height: 1.55; color: #eafff2; background: #0a0e14; border: 1px solid #17281f; border-radius: 12px; padding: 20px; margin-bottom: 18px; }
  .q-opts { display: grid; gap: 10px; }
  .q-opt { text-align: left; padding: 15px 18px; border-radius: 10px; border: 1px solid #1e3a2e; background: #0a0e14; color: #cfe3d8; cursor: pointer; font-size: 16px; transition: all .12s; }
  .q-opt:hover { border-color: #2f5d44; }
  .q-opt.correct { border-color: #39ff88; background: #0f2318; color: #eafff2; }
  .q-opt.wrong { border-color: #ff5c5c; background: #1a0d0d; color: #ffb3b3; }
  .q-opt:disabled { cursor: default; }
</style>
</head>
<body>
<div class="wrap">

  <div class="banner">
    <div class="grain"></div>
    <div style="position:relative;z-index:1;">
      <div class="kick mono">&gt; ./vocab --course=cybersec-2</div>
      <h1 class="mono">Vocabulary Lab<span class="cursor"></span></h1>
      <p class="lead">Master the terms that matter. Filter by module, drill with flashcards, then prove it in <b style="color:#39ff88;">DECRYPT</b> and the quiz. <a href="index.html">&larr; back to course home</a></p>
    </div>
  </div>

  <div class="card">
    <div class="label mono">// SELECT MODULE(S)</div>
    <div class="chips" id="chips"></div>
    <div class="count mono" id="count"></div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab on" data-mode="cards">FLASHCARDS<small>flip &amp; review</small></div>
    <div class="tab" data-mode="decrypt">DECRYPT<small>beat the leak</small></div>
    <div class="tab" data-mode="quiz">QUIZ<small>test yourself</small></div>
  </div>

  <div id="panel"></div>

  <div class="mono" style="text-align:center;margin-top:30px;font-size:12px;color:#3d5749;">&gt; knowledge is the best exploit_</div>
</div>

<script>
/* ============================================================
   VOCABULARY DATA — edit here. m = module number (1-10).
   Send Mr. Reasey's real term list and swap this block in.
   ============================================================ */
const MODULES = {
  1:"Threats, Adversaries & Attacks",
  2:"Organizational Security",
  3:"Physical Security",
  4:"Network Attacks & Vulnerabilities",
  5:"Detecting & Protecting Network Attacks",
  6:"Device & Password Vulnerabilities & Attacks",
  7:"Detecting & Protecting from Device & Password Attacks",
  8:"Application & Data Attacks & Vulnerabilities",
  9:"Cryptography",
  10:"Detecting & Protecting from Application & Data Attacks"
};
const VOCAB = [
  {m:1,t:"Threat Actor",d:"An individual or group that carries out a cyberattack."},
  {m:1,t:"Hacktivist",d:"An attacker motivated by a political or social cause."},
  {m:1,t:"Malware",d:"Software designed to damage, disrupt, or gain unauthorized access to a system."},
  {m:1,t:"Vulnerability",d:"A weakness in a system that can be exploited by a threat."},
  {m:1,t:"Exploit",d:"Code or a technique that takes advantage of a vulnerability."},
  {m:1,t:"Attack Vector",d:"The path or method an attacker uses to gain access to a target."},
  {m:1,t:"Zero-Day",d:"A vulnerability unknown to the vendor, with no patch available yet."},

  {m:2,t:"Security Policy",d:"Documented rules that govern how an organization protects its systems and data."},
  {m:2,t:"Acceptable Use Policy",d:"Rules defining how employees may properly use company systems (AUP)."},
  {m:2,t:"Least Privilege",d:"Giving users only the minimum access they need to do their job."},
  {m:2,t:"Separation of Duties",d:"Splitting critical tasks so no single person has full control."},
  {m:2,t:"Incident Response",d:"An organized plan for handling and recovering from a security breach."},
  {m:2,t:"Risk Assessment",d:"The process of identifying and evaluating potential threats to an organization."},

  {m:3,t:"Access Control Vestibule",d:"A two-door entry system that traps an intruder between doors (mantrap)."},
  {m:3,t:"Biometrics",d:"Authentication using unique physical traits like fingerprints or retinas."},
  {m:3,t:"Tailgating",d:"Following an authorized person through a secure door without credentials."},
  {m:3,t:"Bollard",d:"A sturdy post that blocks vehicles from entering a restricted area."},
  {m:3,t:"Faraday Cage",d:"An enclosure that blocks electromagnetic signals from entering or leaving."},
  {m:3,t:"Surveillance",d:"Monitoring a facility with cameras (CCTV) and sensors to detect intruders."},

  {m:4,t:"Denial of Service",d:"Flooding a system with traffic to make it unavailable to users (DoS)."},
  {m:4,t:"Man in the Middle",d:"Secretly intercepting communication between two parties (MitM)."},
  {m:4,t:"Packet Sniffing",d:"Capturing and inspecting data as it travels across a network."},
  {m:4,t:"Spoofing",d:"Faking an identity such as an IP, MAC, or email address."},
  {m:4,t:"ARP Poisoning",d:"Corrupting a network's address table to redirect and intercept traffic."},
  {m:4,t:"Rogue Access Point",d:"An unauthorized wireless access point used to intercept traffic."},

  {m:5,t:"Firewall",d:"A device or software that filters network traffic based on security rules."},
  {m:5,t:"Intrusion Detection System",d:"A tool that monitors a network and alerts on suspicious activity (IDS)."},
  {m:5,t:"Intrusion Prevention System",d:"A tool that detects and actively blocks network threats (IPS)."},
  {m:5,t:"VPN",d:"An encrypted tunnel that secures traffic over a public network."},
  {m:5,t:"Network Segmentation",d:"Dividing a network into zones to limit how far an attack can spread."},
  {m:5,t:"Honeypot",d:"A decoy system set up to lure attackers and study their methods."},
  {m:5,t:"DMZ",d:"A buffer subnet that exposes public services while shielding the internal network."},

  {m:6,t:"Brute Force Attack",d:"Trying every possible combination to guess a password."},
  {m:6,t:"Dictionary Attack",d:"Guessing passwords using a list of common words and phrases."},
  {m:6,t:"Rainbow Table",d:"A precomputed table of hashes used to reverse and crack passwords."},
  {m:6,t:"Credential Stuffing",d:"Reusing leaked username and password pairs to break into accounts."},
  {m:6,t:"Keylogger",d:"Malware that secretly records a user's keystrokes."},
  {m:6,t:"Privilege Escalation",d:"Gaining a higher level of access than you were granted."},

  {m:7,t:"Multifactor Authentication",d:"Verifying identity with two or more independent factors (MFA)."},
  {m:7,t:"Salting",d:"Adding random data to a password before hashing it for extra protection."},
  {m:7,t:"Hashing",d:"Converting data into a fixed-length, irreversible value."},
  {m:7,t:"Password Manager",d:"A tool that securely stores and generates strong, unique passwords."},
  {m:7,t:"Account Lockout",d:"Disabling an account after too many failed login attempts."},
  {m:7,t:"Endpoint Protection",d:"Security software that defends individual devices from threats."},

  {m:8,t:"SQL Injection",d:"Inserting malicious database commands through an application's input."},
  {m:8,t:"Cross-Site Scripting",d:"Injecting malicious scripts into web pages viewed by other users (XSS)."},
  {m:8,t:"Buffer Overflow",d:"Overrunning a memory buffer to crash a program or run malicious code."},
  {m:8,t:"Directory Traversal",d:"Accessing files outside a web application's intended folder."},
  {m:8,t:"Input Validation",d:"Checking user-supplied data to ensure it is safe before processing."},
  {m:8,t:"Cross-Site Request Forgery",d:"Tricking a logged-in user into making an unwanted request (CSRF)."},

  {m:9,t:"Encryption",d:"Converting readable data into an unreadable form to protect it."},
  {m:9,t:"Symmetric Encryption",d:"Using the same secret key to both encrypt and decrypt data."},
  {m:9,t:"Asymmetric Encryption",d:"Using a paired public and private key to encrypt and decrypt."},
  {m:9,t:"Ciphertext",d:"Data that has been encrypted and is unreadable without a key."},
  {m:9,t:"Public Key Infrastructure",d:"The system of certificates and keys that verifies identities (PKI)."},
  {m:9,t:"Digital Signature",d:"Cryptographic proof that a message is authentic and unaltered."},

  {m:10,t:"Web Application Firewall",d:"A filter that inspects HTTP traffic to protect web apps (WAF)."},
  {m:10,t:"Patch Management",d:"Regularly updating software to fix known vulnerabilities."},
  {m:10,t:"Data Loss Prevention",d:"Tools that stop sensitive data from leaving an organization (DLP)."},
  {m:10,t:"Penetration Testing",d:"An authorized simulated attack used to find weaknesses."},
  {m:10,t:"Backup",d:"A saved copy of data used to recover after loss or an attack."},
  {m:10,t:"Encryption at Rest",d:"Encrypting data while it is stored, not just while it travels."}
];

/* ---------- shared ---------- */
const $ = s => document.querySelector(s);
const panel = $("#panel");
let selected = new Set(Object.keys(MODULES).map(Number));
let mode = "cards";
const shuffle = a => { a = a.slice(); for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const pool = () => VOCAB.filter(v => selected.has(v.m));
const norm = s => s.toLowerCase().replace(/[^a-z0-9]/g,"");
const gameAnswer = t => t.replace(/\(.*?\)/g,"").split("/")[0].trim();

/* ---------- chips ---------- */
function renderChips(){
  const c = $("#chips");
  const allOn = selected.size === Object.keys(MODULES).length;
  let html = `<div class="chip all ${allOn?'on':''}" data-all="1">ALL MODULES</div>`;
  Object.entries(MODULES).forEach(([n,name]) => {
    html += `<div class="chip ${selected.has(+n)?'on':''}" data-m="${n}">${n}. ${name}</div>`;
  });
  c.innerHTML = html;
  $("#count").textContent = `// ${pool().length} terms across ${selected.size} module${selected.size===1?'':'s'} selected`;
}
$("#chips").addEventListener("click", e => {
  const el = e.target.closest(".chip"); if(!el) return;
  if(el.dataset.all){
    if(selected.size === Object.keys(MODULES).length) selected = new Set();
    else selected = new Set(Object.keys(MODULES).map(Number));
  } else {
    const m = +el.dataset.m;
    selected.has(m) ? selected.delete(m) : selected.add(m);
  }
  renderChips(); render();
});

/* ---------- tabs ---------- */
$("#tabs").addEventListener("click", e => {
  const t = e.target.closest(".tab"); if(!t) return;
  mode = t.dataset.mode;
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on", x===t));
  render();
});

function render(){
  stopTimers();
  if(pool().length === 0){ panel.innerHTML = `<div class="card empty">Select at least one module above to begin.</div>`; return; }
  if(mode==="cards") renderCards();
  else if(mode==="decrypt") renderDecrypt();
  else renderQuiz();
}

/* ================= FLASHCARDS ================= */
let fcDeck=[], fcIdx=0, fcFlip=false;
function renderCards(){
  fcDeck = shuffle(pool()); fcIdx=0; fcFlip=false;
  panel.innerHTML = `
    <div class="card fc">
      <div class="fc-card" id="fcCard">
        <div class="fc-inner">
          <div class="fc-face fc-front">
            <div class="fc-modtag mono" id="fcMod"></div>
            <div class="fc-term" id="fcTerm"></div>
            <div class="fc-hint mono">click to reveal definition</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-modtag mono" id="fcMod2"></div>
            <div class="fc-def" id="fcDef"></div>
            <div class="fc-hint mono">click to flip back</div>
          </div>
        </div>
      </div>
    </div>
    <div class="fc-ctrl">
      <button class="btn" id="fcPrev">&larr; prev</button>
      <div class="prog mono" id="fcProg"></div>
      <div style="display:flex;gap:8px;">
        <button class="btn" id="fcShuf">shuffle</button>
        <button class="btn primary" id="fcNext">next &rarr;</button>
      </div>
    </div>`;
  const card = $("#fcCard");
  card.addEventListener("click", ()=>{ fcFlip=!fcFlip; card.classList.toggle("flip",fcFlip); });
  $("#fcPrev").onclick = ()=>{ fcIdx=(fcIdx-1+fcDeck.length)%fcDeck.length; showCard(); };
  $("#fcNext").onclick = ()=>{ fcIdx=(fcIdx+1)%fcDeck.length; showCard(); };
  $("#fcShuf").onclick = ()=>{ fcDeck=shuffle(fcDeck); fcIdx=0; showCard(); };
  showCard();
}
function showCard(){
  const v = fcDeck[fcIdx]; fcFlip=false; $("#fcCard").classList.remove("flip");
  $("#fcMod").textContent = "MODULE "+String(v.m).padStart(2,"0");
  $("#fcMod2").textContent = "MODULE "+String(v.m).padStart(2,"0");
  $("#fcTerm").textContent = v.t;
  $("#fcDef").textContent = v.d;
  $("#fcProg").textContent = (fcIdx+1)+" / "+fcDeck.length;
}

/* ================= DECRYPT GAME ================= */
let gTimers=[], gQueue=[], gRound=0, gScore=0, gStreak=0, gBest=0, gAnswer="", gChars=[], gRevealed=[], gPhase="", gLeaked=0, gGraceMs=5000, gHintMs=1800;
function stopTimers(){ gTimers.forEach(clearInterval); gTimers=[]; }
function renderDecrypt(){
  gQueue = shuffle(pool()).slice(0, Math.min(10, pool().length));
  gRound=0; gScore=0; gStreak=0;
  panel.innerHTML = `
    <div class="card">
      <div class="g-top">
        <div class="g-stat">ROUND<b id="gRound">1 / ${gQueue.length}</b></div>
        <div class="g-stat">SCORE<b id="gScore">0</b></div>
        <div class="g-stat amber">STREAK<b id="gStreak">0</b></div>
      </div>
      <div class="timerbar"><div class="timerfill" id="gFill"></div></div>
      <div class="g-def" id="gDef"></div>
      <div class="g-boxes" id="gBoxes"></div>
      <div class="g-in">
        <input id="gInput" placeholder="type the term…" autocomplete="off" spellcheck="false">
        <button class="btn primary" id="gSubmit">enter</button>
        <button class="btn" id="gSkip">skip</button>
      </div>
      <div class="g-msg mono" id="gMsg">&gt; decrypting… you have 5 seconds before the leak starts</div>
    </div>`;
  $("#gSubmit").onclick = checkGuess;
  $("#gSkip").onclick = ()=>{ revealAll(); endRound(false); };
  $("#gInput").addEventListener("keydown", e=>{ if(e.key==="Enter") checkGuess(); });
  startRound();
}
function startRound(){
  stopTimers();
  const v = gQueue[gRound];
  gAnswer = gameAnswer(v.t);
  gChars = [...gAnswer];
  const isAl = c => /[a-z0-9]/i.test(c);
  gRevealed = gChars.map(c => !isAl(c));
  gPhase = "grace"; gLeaked = 0;
  $("#gDef").innerHTML = `<span class="mono" style="color:#39ff88;font-size:12px;">MODULE ${String(v.m).padStart(2,"0")}</span><br>${v.d}`;
  $("#gRound").textContent = (gRound+1)+" / "+gQueue.length;
  $("#gMsg").innerHTML = "&gt; decrypting… you have 5 seconds before the leak starts";
  $("#gMsg").style.color = "#7fa896";
  const inp = $("#gInput"); inp.value=""; inp.disabled=false; inp.focus();
  renderBoxes();
  // grace countdown
  let t = gGraceMs;
  $("#gFill").style.background = "#39ff88";
  gTimers.push(setInterval(()=>{
    t -= 100; $("#gFill").style.width = Math.max(0,(t/gGraceMs*100))+"%";
    if(t<=0){ stopTimers(); beginLeak(); }
  },100));
}
function beginLeak(){
  gPhase="leak";
  $("#gFill").style.background="#ffcf5c"; $("#gFill").style.width="100%";
  $("#gMsg").innerHTML = "&gt; LEAK ACTIVE — letters incoming, answer fast!";
  $("#gMsg").style.color = "#ffcf5c";
  leakOne();
  gTimers.push(setInterval(leakOne, gHintMs));
}
function leakOne(){
  const hidden = gRevealed.map((r,i)=>r?null:i).filter(i=>i!==null);
  if(hidden.length===0){ stopTimers(); return; }
  const pick = hidden[Math.floor(Math.random()*hidden.length)];
  gRevealed[pick]=true; gLeaked++; renderBoxes(true, pick);
  if(gRevealed.every(Boolean)){ stopTimers(); $("#gMsg").innerHTML="&gt; fully leaked — type it in for partial credit"; }
}
function renderBoxes(animateIdx, idx){
  const box = $("#gBoxes"); let letterPos=0; let html="";
  gChars.forEach((c,i)=>{
    if(/[a-z0-9]/i.test(c)){
      const rev = gRevealed[i];
      html += `<div class="lb ${rev?'rev':''}" data-i="${i}">${rev?c:""}</div>`;
    } else if(c===" "){ html += `<div class="sep"></div>`; }
    else { html += `<div class="lb" style="border-color:#17281f;color:#5c7a6b;">${c}</div>`; }
  });
  box.innerHTML = html;
}
function revealAll(){ gRevealed = gChars.map(()=>true); renderBoxes(); }
function checkGuess(){
  if(gPhase==="done") return;
  const val = $("#gInput").value;
  if(norm(val)===norm(gAnswer) && norm(val).length){
    endRound(true);
  } else {
    $("#gMsg").innerHTML = "&gt; access denied — try again";
    $("#gMsg").style.color = "#ff7b7b";
    $("#gInput").select();
  }
}
function endRound(correct){
  stopTimers(); gPhase="done";
  $("#gInput").disabled=true;
  let pts = 0;
  if(correct){
    pts = gLeaked===0 ? 100 : Math.max(15, 100 - gLeaked*15);
    gScore += pts; gStreak += 1; gBest=Math.max(gBest,gStreak);
    $("#gMsg").innerHTML = `&gt; ACCESS GRANTED — +${pts} pts${gLeaked===0?" · clean crack!":""}`;
    $("#gMsg").style.color = "#39ff88";
  } else {
    gStreak = 0;
    $("#gMsg").innerHTML = `&gt; skipped — the term was "<b style="color:#eafff2;">${gAnswer}</b>"`;
    $("#gMsg").style.color = "#7fa896";
  }
  revealAll();
  $("#gScore").textContent = gScore;
  $("#gStreak").textContent = gStreak;
  setTimeout(()=>{
    gRound++;
    if(gRound >= gQueue.length) gameOver();
    else startRound();
  }, 1400);
}
function gameOver(){
  stopTimers();
  const max = gQueue.length*100;
  panel.querySelector(".card").innerHTML = `
    <div class="g-summary">
      <div class="mono" style="color:#39ff88;font-size:12px;letter-spacing:2px;">// SESSION COMPLETE</div>
      <div class="big mono">${gScore}</div>
      <div style="color:#7fa896;font-size:14px;margin-bottom:6px;">out of ${max} possible · best streak ${gBest}</div>
      <div style="color:#a9c4b6;font-size:15px;margin-bottom:22px;">${gScore>=max*0.8?"Elite. You cracked the system.":gScore>=max*0.5?"Solid work, keep drilling.":"Run it again — repetition is the exploit."}</div>
      <button class="btn primary" onclick="renderDecrypt()">play again</button>
    </div>`;
}

/* ================= QUIZ ================= */
let qQueue=[], qIdx=0, qScore=0;
function renderQuiz(){
  qQueue = shuffle(pool()).slice(0, Math.min(10, pool().length));
  qIdx=0; qScore=0;
  panel.innerHTML = `
    <div class="card">
      <div class="g-top">
        <div class="g-stat">QUESTION<b id="qNum">1 / ${qQueue.length}</b></div>
        <div class="g-stat">SCORE<b id="qScore">0</b></div>
      </div>
      <div class="q-def" id="qDef"></div>
      <div class="q-opts" id="qOpts"></div>
      <div class="g-msg mono" id="qMsg"></div>
    </div>`;
  showQuestion();
}
function showQuestion(){
  const v = qQueue[qIdx];
  const distractPool = (pool().length>=4 ? pool() : VOCAB).filter(x=>x.t!==v.t);
  const opts = shuffle([v, ...shuffle(distractPool).slice(0,3)]);
  $("#qNum").textContent = (qIdx+1)+" / "+qQueue.length;
  $("#qDef").innerHTML = `<span class="mono" style="color:#39ff88;font-size:12px;">MODULE ${String(v.m).padStart(2,"0")} — what term fits?</span><br>${v.d}`;
  $("#qMsg").textContent="";
  const box = $("#qOpts");
  box.innerHTML = opts.map(o=>`<button class="q-opt" data-t="${encodeURIComponent(o.t)}">${o.t}</button>`).join("");
  box.querySelectorAll(".q-opt").forEach(b=>{
    b.onclick = ()=>{
      const chosen = decodeURIComponent(b.dataset.t);
      box.querySelectorAll(".q-opt").forEach(x=>{
        x.disabled=true;
        if(decodeURIComponent(x.dataset.t)===v.t) x.classList.add("correct");
      });
      if(chosen===v.t){ qScore++; $("#qMsg").innerHTML="&gt; correct"; $("#qMsg").style.color="#39ff88"; }
      else { b.classList.add("wrong"); $("#qMsg").innerHTML="&gt; not quite"; $("#qMsg").style.color="#ff7b7b"; }
      $("#qScore").textContent=qScore;
      setTimeout(()=>{ qIdx++; qIdx>=qQueue.length ? quizOver() : showQuestion(); }, 1100);
    };
  });
}
function quizOver(){
  panel.querySelector(".card").innerHTML = `
    <div class="g-summary">
      <div class="mono" style="color:#39ff88;font-size:12px;letter-spacing:2px;">// QUIZ COMPLETE</div>
      <div class="big mono">${qScore} / ${qQueue.length}</div>
      <div style="color:#a9c4b6;font-size:15px;margin:8px 0 22px;">${qScore===qQueue.length?"Perfect run!":qScore>=qQueue.length*0.7?"Strong — review the misses.":"Hit the flashcards and run it back."}</div>
      <button class="btn primary" onclick="renderQuiz()">try again</button>
    </div>`;
}

renderChips();
render();
</script>
